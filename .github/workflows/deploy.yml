name: Resources via SFTP spiegeln (Full-Mirror)

# Dieses Repository = der komplette Inhalt des `resources/`-Ordners auf dem
# Gameserver. Repo-Root == .../resources auf dem SFTP-Server.
#
# Bei jedem Push wird NICHT mehr nur der Commit-Diff übertragen, sondern der
# GESAMTE Repo-Inhalt mit dem Zielordner gespiegelt (lftp mirror):
#   * neue / geänderte Dateien werden hochgeladen,
#   * Dateien/Ordner, die im Repo NICHT (mehr) existieren, werden auf dem
#     Server GELÖSCHT.
# Ergebnis: Der Zielordner entspricht danach EXAKT dem Repository-Stand.
# Nur git-interne Dinge (.git, .github, .gitignore, .gitattributes) werden
# ausgenommen.
#
# ACHTUNG: Durch `--delete` wird ALLES im Zielordner entfernt, was nicht im
# Repository liegt. Liegen dort manuell gepflegte Resources, die nicht im Repo
# sind, gingen sie verloren -> dann vorher ins Repo aufnehmen.

on:
  push:
    branches:
      - main
  # Erlaubt eine manuelle, vollständige Re-Synchronisation per Knopfdruck.
  workflow_dispatch: {}

# Mehrere schnell aufeinanderfolgende Pushes nicht parallel spiegeln,
# sonst überholen sich Uploads/Löschungen.
concurrency:
  group: sftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          # Volle History -> git-restore-mtime kann je Datei die Commit-Zeit
          # ermitteln (siehe nächster Schritt).
          fetch-depth: 0

      - name: lftp installieren & Datei-Zeitstempel wiederherstellen
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

          # Ein frischer Checkout setzt bei ALLEN Dateien die mtime auf "jetzt".
          # Ohne Korrektur würde der Mirror deshalb bei jedem Lauf den kompletten
          # Ordner neu hochladen. git-restore-mtime setzt die mtime jeder Datei
          # auf die Zeit ihres letzten Commits -> der Mirror überträgt dann nur
          # tatsächlich geänderte Dateien. Schlägt das fehl, wird im Zweifel
          # einfach mehr übertragen -> nicht fatal, die Spiegelung bleibt korrekt.
          export PATH="$HOME/.local/bin:$PATH"
          python3 -m pip install --quiet --break-system-packages git-restore-mtime \
            || python3 -m pip install --quiet --user git-restore-mtime \
            || true
          git restore-mtime \
            || echo "Hinweis: git-restore-mtime nicht verfügbar – ggf. werden alle Dateien übertragen."

      - name: Per SFTP spiegeln (mirror)
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          # Zielordner auf dem SFTP-Server (entspricht dem Repo-Root).
          REMOTE_BASE: /txData/ESXLegacy_7CCB6A.base/resources
        run: |
          set -euo pipefail

          # Secrets / Ziel absichern (verhindert u.a. ein versehentliches
          # --delete gegen einen leeren/falschen Zielpfad).
          : "${SFTP_HOST:?SFTP_HOST Secret fehlt}"
          : "${SFTP_USER:?SFTP_USER Secret fehlt}"
          : "${SFTP_PASSWORD:?SFTP_PASSWORD Secret fehlt}"
          : "${REMOTE_BASE:?REMOTE_BASE darf nicht leer sein}"
          PORT="${SFTP_PORT:-22}"

          echo "Spiegel-Ziel: $SFTP_HOST:$PORT  ->  $REMOTE_BASE"

          # Hinweise zum lftp-Skript:
          #   open -u user,pass         : Passwort kommt per stdin (heredoc), nicht
          #                               über die Prozess-Argumente (kein 'ps'-Leak).
          #   sftp:auto-confirm yes     : unbekannten Host-Key automatisch akzeptieren.
          #   sftp:connect-program ...  : ssh ohne Host-Key-Prompt (wie StrictHostKeyChecking=no).
          #   mkdir -p                  : Zielordner anlegen, falls noch nicht vorhanden
          #                               (läuft VOR fail-exit -> "existiert schon" ist egal).
          #   cmd:fail-exit yes         : ab hier bricht lftp bei Fehlern ab -> Job
          #                               schlägt sichtbar fehl.
          #   mirror -R                 : reverse = lokal -> remote.
          #     --delete                : entfernt remote alles, was lokal fehlt.
          #     --no-perms              : keine chmod-Versuche (FiveM braucht keine Rechte).
          #     --verbose               : jede Übertragung/Löschung erscheint im Log.
          #     --exclude '^\.git'      : schließt .git, .github, .gitignore,
          #                               .gitattributes aus (alles, was mit ".git" beginnt).
          #   "./" -> "$REMOTE_BASE"    : ganzer Repo-Inhalt in den Resources-Ordner.
          lftp <<LFTP_SCRIPT
          set sftp:auto-confirm yes
          set net:timeout 30
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set sftp:connect-program "ssh -a -x -oStrictHostKeyChecking=no -oUserKnownHostsFile=/dev/null -oConnectTimeout=30"
          open -u "${SFTP_USER},${SFTP_PASSWORD}" "sftp://${SFTP_HOST}:${PORT}"
          mkdir -p "${REMOTE_BASE}"
          set cmd:fail-exit yes
          mirror --reverse --delete --no-perms --verbose --exclude '^\.git' ./ "${REMOTE_BASE}"
          bye
          LFTP_SCRIPT

          echo "Mirror abgeschlossen – Server entspricht jetzt dem Repository-Stand."
