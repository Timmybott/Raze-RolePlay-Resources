name: Deploy Resources & Restart Server

on:
  push:
    branches:
      - main

jobs:
  deploy-and-restart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD > changed_files.txt
          cat changed_files.txt

      - name: Upload changed files via SFTP
        run: |
          sudo apt-get install -y lftp

          lftp -u "${{ secrets.SFTP_USER }}","${{ secrets.SFTP_PASSWORD }}" \
            -p ${{ secrets.SFTP_PORT }} \
            sftp://${{ secrets.SFTP_HOST }} <<EOF
          set sftp:auto-confirm yes
          set net:timeout 30

          $(while IFS= read -r file; do
            dir=$(dirname "$file")
            echo "mkdir -p /txData/ESXLegacy_7CCB6A.base/resources/$dir"
            echo "put $file -o /txData/ESXLegacy_7CCB6A.base/resources/$file"
          done < changed_files.txt)

          bye
          EOF

      - name: Restart Pterodactyl Server
        run: |
          curl -X POST "https://panel.spaceify.eu/api/client/servers/7ed1d988/power" \
            -H "Authorization: Bearer ${{ secrets.PTERO_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"signal": "restart"}'