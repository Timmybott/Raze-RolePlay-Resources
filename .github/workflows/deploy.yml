name: Deploy Resources & Restart Server

on:
  push:
    branches:
      - main

jobs:
  deploy-and-restart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SFTP_USER }}
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: './'
          remote_path: '/txData/ESXLegacy_7CCB6A.base/resources/'
          sftp_only: true
          args: '-r'

      - name: Restart Pterodactyl Server
        run: |
          curl -X POST "https://panel.spaceify.eu/api/client/servers/7ed1d988/power" \
            -H "Authorization: Bearer ${{ secrets.PTERO_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"signal": "restart"}'