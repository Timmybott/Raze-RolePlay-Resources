name: Deploy Resources via SFTP

# Dieses Repository = der komplette Inhalt des `resources/`-Ordners auf dem
# Gameserver. Repo-Root == .../resources auf dem SFTP-Server.
#
# Es gibt ZWEI Betriebsarten:
#
# 1) Bei jedem Push (schnell, Standard):
#    Es wird GENAU das übertragen, was der Push geändert hat – nicht mehr und
#    nicht weniger:
#      * neue/geänderte Dateien  -> hochladen (put)
#      * gelöschte Dateien       -> löschen (rm)
#      * umbenannte Dateien      -> alter Name rm + neuer Name put
#    Es werden AUSSCHLIESSLICH DATEIEN angefasst, NIEMALS Verzeichnisse gelöscht.
#    Grund: git trackt nur Dateien – ein Commit kann also nie "lösche Ordner X"
#    bedeuten, nur "lösche diese Dateien". Ein zusätzliches 'rmdir' wäre eine
#    Erfindung des Skripts und kann auf manchen SFTP-Servern sogar REKURSIV
#    wirken und Geschwister-Resources mitreißen (genau so verschwand früher der
#    komplette [standalone]-Ordner). Kein Voll-Scan des Servers -> Sekunden.
#
# 2) Manuell ("Run workflow" -> workflow_dispatch): VOLL-MIRROR.
#    Spiegelt den kompletten Repo-Stand und LÖSCHT auf dem Server alles, was
#    nicht im Repo liegt. Gedacht als Erst-Synchronisation bzw. "Reparatur-
#    Knopf" (z.B. um leer gebliebene Ordner aufzuräumen oder fehlende Dateien
#    nachzuziehen).
#
# Nur git-interne Dinge (.git, .github, .gitignore, .gitattributes) werden in
# beiden Fällen ausgenommen.

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

# Mehrere schnell aufeinanderfolgende Läufe nicht parallel deployen,
# sonst überholen sich Uploads/Löschungen.
concurrency:
  group: sftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          # Volle History, damit der Vorgänger-Commit (github.event.before)
          # für den Diff lokal verfügbar ist.
          fetch-depth: 0

      # ----------------------------------------------------------------------
      # SCHNELLER PFAD: nur den Commit-Diff übertragen (bei push)
      # ----------------------------------------------------------------------
      - name: Änderungen ermitteln und SFTP-Batch bauen
        id: plan
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          # Zielordner auf dem SFTP-Server (entspricht dem Repo-Root).
          REMOTE_BASE: /txData/ESXLegacy_7CCB6A.base/resources
        run: |
          # Kein 'set -u': leere (assoziative) Arrays würden sonst je nach
          # bash-Version einen "unbound variable"-Fehler werfen.
          set -o pipefail

          empty_tree=$(git hash-object -t tree /dev/null)
          BEFORE="$BEFORE_SHA"
          HEAD="$AFTER_SHA"

          # Vorgänger-Commit absichern: bei erstem Push / Force-Push / fehlendem
          # before-Commit auf HEAD~1 bzw. den leeren Tree zurückfallen.
          if [ -z "$BEFORE" ] \
             || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
             || ! git rev-parse -q --verify "${BEFORE}^{commit}" >/dev/null 2>&1; then
            if git rev-parse -q --verify "${HEAD}~1^{commit}" >/dev/null 2>&1; then
              BEFORE=$(git rev-parse "${HEAD}~1")
            else
              BEFORE="$empty_tree"
            fi
          fi

          echo "Diff: $BEFORE -> $HEAD"
          echo "Zielbasis: $REMOTE_BASE"

          : > batch.sftp
          declare -A made_dir       # schon angelegte Remote-Verzeichnisse (dedupe)

          uploads=()
          deletes=()

          # CI-Dateien (.github/...) und git-Metadaten sind keine Game-Resources.
          skip() { case "$1" in .github/*|.git/*|.gitignore|.gitattributes) return 0;; *) return 1;; esac; }

          # Diff NUL-getrennt lesen -> robust gegen Leerzeichen/Sonderzeichen.
          # Rename (R) / Copy (C) liefern je zwei Pfade (alt + neu).
          while IFS= read -r -d '' status; do
            case "$status" in
              R*)
                IFS= read -r -d '' old
                IFS= read -r -d '' new
                skip "$old" || deletes+=("$old")
                skip "$new" || uploads+=("$new")
                ;;
              C*)
                IFS= read -r -d '' old
                IFS= read -r -d '' new
                skip "$new" || uploads+=("$new")
                ;;
              D)
                IFS= read -r -d '' path
                skip "$path" || deletes+=("$path")
                ;;
              *)
                # A (added), M (modified), T (type changed) -> hochladen
                IFS= read -r -d '' path
                skip "$path" || uploads+=("$path")
                ;;
            esac
          done < <(git diff -M -C -z --name-status "$BEFORE" "$HEAD")

          # Remote-Elternverzeichnisse für eine Datei anlegen (kürzestes zuerst).
          # '-mkdir' -> Fehler (Verzeichnis existiert schon) wird ignoriert.
          # (mkdir ist unkritisch: es legt nur an, löscht nie etwas.)
          emit_dirs() {
            local dir; dir=$(dirname "$1")
            [ "$dir" = "." ] && return 0
            local acc="" seg
            local IFS='/'
            for seg in $dir; do
              [ -z "$seg" ] && continue
              if [ -z "$acc" ]; then acc="$seg"; else acc="$acc/$seg"; fi
              if [ -z "${made_dir[$acc]:-}" ]; then
                made_dir[$acc]=1
                printf -- '-mkdir "%s/%s"\n' "$REMOTE_BASE" "$acc" >> batch.sftp
              fi
            done
          }

          # Uploads: Verzeichnisse sicherstellen + Datei übertragen.
          # Pfade in "..." -> sftp macht KEIN Globbing (wichtig für [klammer]-Ordner).
          if [ "${#uploads[@]}" -gt 0 ]; then
            for f in "${uploads[@]}"; do
              emit_dirs "$f"
              printf 'put "%s" "%s/%s"\n' "$f" "$REMOTE_BASE" "$f" >> batch.sftp
            done
          fi

          # Löschungen: GENAU die Dateien entfernen, die der Commit entfernt hat
          # (auch der "alte" Name bei Umbenennungen). '-rm' -> Fehler (Datei
          # schon weg) wird ignoriert.
          #
          # BEWUSST KEIN 'rmdir': Es werden nur Dateien gelöscht, niemals
          # Verzeichnisse. Damit kann eine Löschung niemals über die im Commit
          # entfernten Dateien hinausgreifen oder (bei rekursivem rmdir mancher
          # Server) Nachbar-Resources mitreißen. Ein evtl. leer zurückbleibender
          # Ordner stört FXServer nicht; aufräumen tut bei Bedarf der Voll-Mirror.
          if [ "${#deletes[@]}" -gt 0 ]; then
            for f in "${deletes[@]}"; do
              printf -- '-rm "%s/%s"\n' "$REMOTE_BASE" "$f" >> batch.sftp
            done
          fi

          echo "=== Geplante SFTP-Befehle ==="
          if [ -s batch.sftp ]; then
            cat batch.sftp
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "(keine zu deployenden Änderungen)"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Diff per SFTP übertragen
        if: github.event_name == 'push' && steps.plan.outputs.has_changes == 'true'
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

          # -oBatchMode=no  : erlaubt Passwort-Auth (von sshpass gefüttert) im -b Modus
          # StrictHostKeyChecking=no + /dev/null : kein interaktiver Host-Key-Prompt
          # Schlägt ein nicht mit '-' versehener Befehl (z.B. put) fehl, bricht sftp
          # mit Fehlercode ab -> der Job schlägt sichtbar fehl.
          sshpass -p "$SFTP_PASSWORD" \
            sftp -oBatchMode=no \
                 -oStrictHostKeyChecking=no \
                 -oUserKnownHostsFile=/dev/null \
                 -oConnectTimeout=30 \
                 -P "${SFTP_PORT:-22}" \
                 -b batch.sftp \
                 "$SFTP_USER@$SFTP_HOST"

          echo "Inkrementeller Deploy abgeschlossen."

      # ----------------------------------------------------------------------
      # REPARATUR-PFAD: kompletter Voll-Mirror (nur bei manuellem Auslösen)
      # ----------------------------------------------------------------------
      - name: Voll-Mirror (manuell, gleicht Server exakt an Repo an)
        if: github.event_name == 'workflow_dispatch'
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          REMOTE_BASE: /txData/ESXLegacy_7CCB6A.base/resources
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

          : "${SFTP_HOST:?SFTP_HOST Secret fehlt}"
          : "${SFTP_USER:?SFTP_USER Secret fehlt}"
          : "${SFTP_PASSWORD:?SFTP_PASSWORD Secret fehlt}"
          : "${REMOTE_BASE:?REMOTE_BASE darf nicht leer sein}"
          PORT="${SFTP_PORT:-22}"

          echo "VOLL-MIRROR -> $SFTP_HOST:$PORT : $REMOTE_BASE"
          echo "ACHTUNG: löscht auf dem Server alles, was nicht im Repo liegt."

          # mirror -R (reverse: lokal -> remote), --delete entfernt remote alles,
          # was lokal fehlt; --exclude '^\.git' nimmt .git/.github/.gitignore/
          # .gitattributes aus. cmd:fail-exit -> Job schlägt bei Fehlern fehl.
          lftp <<LFTP_SCRIPT
          set sftp:auto-confirm yes
          set net:timeout 30
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set sftp:connect-program "ssh -a -x -oStrictHostKeyChecking=no -oUserKnownHostsFile=/dev/null -oConnectTimeout=30"
          open -u "${SFTP_USER},${SFTP_PASSWORD}" "sftp://${SFTP_HOST}:${PORT}"
          mkdir -p "${REMOTE_BASE}"
          set cmd:fail-exit yes
          mirror --reverse --delete --no-perms --verbose --exclude '^\.git' ./ "${REMOTE_BASE}"
          bye
          LFTP_SCRIPT

          echo "Voll-Mirror abgeschlossen – Server entspricht jetzt dem Repository-Stand."
