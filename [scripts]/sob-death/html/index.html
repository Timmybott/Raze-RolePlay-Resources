<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container hidden" id="container">
        <!-- Top: Main Text -->
        <div class="top-section">
            <h1>BEWUSSTLOS</h1>
            <p>Du benötigst medizinische Hilfe</p>
        </div>

        <!-- Bottom: Actions & Timer -->
        <div class="bottom-section">
            <div class="dispatch-box">
                <kbd>G</kbd>
                <div class="dispatch-text">
                    <span>Notruf absetzen</span>
                    <span>Informiere die Rettungskräfte</span>
                </div>
            </div>

            <div class="timer-box">
                <div id="countdown">10:00</div>
                <div class="timer-label" id="timer-label">Zeit bis zum Respawn</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
